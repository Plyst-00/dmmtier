<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>最強Tier表まとめ</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
        "Hiragino Kaku Gothic ProN", "Yu Gothic", Meiryo, sans-serif;
      background: #f5f6fa;
      color: #222;
      line-height: 1.6;
    }

    header {
      text-align: center;
      padding: 48px 20px 28px;
      background: linear-gradient(135deg, #222, #444);
      color: #fff;
    }

    header h1 {
      margin: 0;
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      letter-spacing: 0.04em;
    }

    header p {
      margin: 12px 0 0;
      color: #ddd;
      font-size: 0.95rem;
    }

    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 36px 20px 60px;
    }

    section {
      margin-bottom: 52px;
    }

    .section-title {
      font-size: 1.5rem;
      margin: 0 0 22px;
      padding-left: 12px;
      border-left: 5px solid #333;
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 28px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }

    .card:hover {
      transform: translateY(-8px);
      box-shadow: 0 14px 30px rgba(0, 0, 0, 0.16);
    }

    .thumb-link {
      display: block;
      overflow: hidden;
    }

    .thumb-link img {
      width: 100%;
      aspect-ratio: 16 / 9;
      object-fit: cover;
      display: block;
      transition: transform 0.3s ease;
    }

    .card:hover .thumb-link img {
      transform: scale(1.04);
    }

    .card-title {
      display: block;
      padding: 16px 18px 20px;
      font-size: 1.1rem;
      font-weight: 700;
      color: #222;
      text-decoration: none;
      transition: color 0.2s ease;
    }

    .card-title:hover {
      color: #0066cc;
    }

    @media (max-width: 700px) {
      header {
        padding: 36px 16px 24px;
      }

      main {
        padding: 28px 16px 48px;
      }

      .card-grid {
        grid-template-columns: 1fr;
        gap: 22px;
      }

      .section-title {
        font-size: 1.3rem;
      }
    }
  </style>
</head>

<body>
  <header>
    <h1>最強Tier表まとめ</h1>
    <p>攻略記事・関連サイトへのリンク集</p>
  </header>

  <main>
    <section>
      <h2 class="section-title">Tier表</h2>

      <div class="card-grid">
        <article class="card">
          <a class="thumb-link" href="https://plyst-00.github.io/dmmtier/pages/techcronoss.html">
            <img
              src="https://playershi.com/wp-content/uploads/techcronoss_top.webp"
              alt="テクロノス最強Tier表"
            />
          </a>
          <a class="card-title" href="https://plyst-00.github.io/dmmtier/pages/techcronoss.html">
            テクロノス最強Tier表
          </a>
        </article>

        <article class="card">
          <a class="thumb-link" href="https://plyst-00.github.io/dmmtier/pages/dotabyss.html">
            <img
              src="https://playershi.com/wp-content/uploads/dotbyss-tier.webp"
              alt="ドットアビス最強Tier表"
            />
          </a>
          <a class="card-title" href="https://plyst-00.github.io/dmmtier/pages/dotabyss.html">
            ドットアビス最強Tier表
          </a>
        </article>
      </div>
    </section>

    <section>
      <h2 class="section-title">姉妹サイト</h2>

      <div class="card-grid">
        <article class="card">
          <a
            class="thumb-link"
            href="https://meister.knowhow.jp/techcronossx/"
            target="_blank"
            rel="noopener noreferrer"
          >
            <img
              src="https://meister.knowhow.jp/wp-content/uploads/techcronossx_icon.webp"
              alt="テクロノス寝室評価"
            />
          </a>
          <a
            class="card-title"
            href="https://meister.knowhow.jp/techcronossx/"
            target="_blank"
            rel="noopener noreferrer"
          >
            テクロノス寝室評価
          </a>
        </article>

        <article class="card">
          <a
            class="thumb-link"
            href="https://meister.knowhow.jp/dotabyss-htier/"
            target="_blank"
            rel="noopener noreferrer"
          >
            <img
              src="https://meister.knowhow.jp/wp-content/uploads/dotabyss-htier.webp"
              alt="ドットアビス寝室評価"
            />
          </a>
          <a
            class="card-title"
            href="https://meister.knowhow.jp/dotabyss-htier/"
            target="_blank"
            rel="noopener noreferrer"
          >
            ドットアビス寝室評価
          </a>
        </article>
      </div>
    </section>
  </main>
</body>
</html>
